<!-- MODAL: CREAR USUARIO -->
<div class="modal fade" id="modalCrearUsuario" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-user-plus"></i> Crear Nuevo Usuario
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formCrearUsuario" method="post" action="{% url 'crear_usuario' %}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="form-group">
                        <label for="username" class="form-label">Usuario</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            name="username" 
                            required
                            placeholder="Ingrese el nombre de usuario"
                        >
                        <small class="form-text text-muted">Solo letras, números y @/./+/-/_</small>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email" 
                            required
                            placeholder="ejemplo@correo.com"
                        >
                    </div>

                    <div class="form-group">
                        <label for="first_name" class="form-label">Nombre</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="first_name" 
                            name="first_name" 
                            placeholder="Nombre del usuario"
                        >
                    </div>

                    <div class="form-group">
                        <label for="last_name" class="form-label">Apellido</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="last_name" 
                            name="last_name" 
                            placeholder="Apellido del usuario"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Contraseña</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password" 
                            required
                            placeholder="Ingrese la contraseña"
                        >
                        <small class="form-text text-muted">Mínimo 8 caracteres</small>
                    </div>

                    <div class="form-group">
                        <label for="is_active" class="form-label">
                            <input type="checkbox" id="is_active" name="is_active" checked>
                            Usuario Activo
                        </label>
                    </div>

                    <div class="form-group">
                        <label for="is_staff" class="form-label">
                            <input type="checkbox" id="is_staff" name="is_staff">
                            Es Personal Administrativo
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Usuario
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
