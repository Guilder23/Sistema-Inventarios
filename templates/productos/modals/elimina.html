<!-- MODAL: ELIMINAR PRODUCTO -->
<div class="modal fade" id="modalEliminarProducto" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content modal-eliminar">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-trash"></i> Eliminar Producto
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="alert alert-warning">
                    <i class="fas fa-exclamation-triangle"></i>
                    <strong>¡Advertencia!</strong> Esta acción no se puede deshacer.
                </div>
                <p>
                    ¿Está seguro de que desea eliminar el producto <strong id="nombreProductoEliminar"></strong>?
                </p>
                <p class="text-muted">
                    El producto será marcado como inactivo y todos los cambios serán registrados en el historial del sistema.
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button type="button" class="btn btn-danger" id="btnConfirmarEliminar">
                    <i class="fas fa-trash"></i> Sí, Eliminar
                </button>
            </div>
        </div>
    </div>
</div>
