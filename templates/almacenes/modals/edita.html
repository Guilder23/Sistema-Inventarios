<!-- MODAL: EDITAR ALMACÉN -->
<div class="modal fade" id="modalEditarAlmacen" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title">
                    <i class="fas fa-edit"></i> Editar Almacén
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formEditarAlmacen" method="post" action="">
                {% csrf_token %}
                <input type="hidden" id="editarId" name="almacen_id">
                <div class="modal-body">
                    <div class="row">
                        <!-- COLUMNA IZQUIERDA -->
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-info-circle"></i> Información Básica
                            </h6>
                            
                            <div class="form-group">
                                <label for="editarNombre" class="form-label">Nombre del Almacén <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarNombre" 
                                    name="nombre" 
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarCodigo" class="form-label">Código del Almacén <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarCodigo" 
                                    name="codigo" 
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarDescripcion" class="form-label">Descripción</label>
                                <textarea 
                                    class="form-control" 
                                    id="editarDescripcion" 
                                    name="descripcion" 
                                    rows="2"
                                ></textarea>
                            </div>

                            <div class="form-group">
                                <label for="editarDireccion" class="form-label">Dirección <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarDireccion" 
                                    name="direccion" 
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarCiudad" class="form-label">Ciudad <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarCiudad" 
                                    name="ciudad" 
                                    required
                                >
                            </div>
                        </div>

                        <!-- COLUMNA DERECHA -->
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-map"></i> Ubicación y Contacto
                            </h6>

                            <div class="form-group">
                                <label for="editarDepartamento" class="form-label">Departamento <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarDepartamento" 
                                    name="departamento" 
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarPais" class="form-label">País</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarPais" 
                                    name="pais" 
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarCodigoPostal" class="form-label">Código Postal</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarCodigoPostal" 
                                    name="codigo_postal" 
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarTelefono" class="form-label">Teléfono</label>
                                <input 
                                    type="tel" 
                                    class="form-control" 
                                    id="editarTelefono" 
                                    name="telefono" 
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarEmail" class="form-label">Correo Electrónico</label>
                                <input 
                                    type="email" 
                                    class="form-control" 
                                    id="editarEmail" 
                                    name="email" 
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarEstado" class="form-label">Estado <span class="text-danger">*</span></label>
                                <select class="form-control" id="editarEstado" name="estado" required>
                                    <option value="activo">Activo</option>
                                    <option value="inactivo">Inactivo</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="row">
                        <div class="col-12">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-cube"></i> Capacidad
                            </h6>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="editarCapacidadM2" class="form-label">Capacidad en m² (Metros Cuadrados)</label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="editarCapacidadM2" 
                                    name="capacidad_m2" 
                                    step="0.01"
                                >
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="editarCapacidadProductos" class="form-label">Capacidad en Productos (Cantidad)</label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="editarCapacidadProductos" 
                                    name="capacidad_productos" 
                                >
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
