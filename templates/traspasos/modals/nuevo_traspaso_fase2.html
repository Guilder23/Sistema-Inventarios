<!-- Modal Nuevo Traspaso Fase 2 -->
<div class="modal fade" id="modalTraspasoFase2" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nuevo Traspaso - Fase 2: Completar Información</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="formFase2Traspaso">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="codigo"><strong>Código:</strong></label>
                                <input type="text" class="form-control" id="codigo" disabled>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="fechaCreacion"><strong>Fecha:</strong></label>
                                <input type="text" class="form-control" id="fechaCreacion" disabled>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="origen"><strong>Origen:</strong></label>
                                <input type="text" class="form-control" id="origen" disabled>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="destino"><strong>Destino:</strong></label>
                                <select class="form-control" id="destino" name="destino" required>
                                    <option value="">Seleccionar destino...</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="comentario">Comentario (Opcional)</label>
                        <textarea class="form-control" id="comentario" name="comentario" rows="3" placeholder="Agregue comentarios sobre este traspaso..."></textarea>
                    </div>

                    <div class="form-group">
                        <h6 class="font-weight-bold">Resumen de Productos:</h6>
                        <div id="resumenProductos" class="alert alert-light">
                            <!-- Se llena dinámicamente -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="btnVolverFase1">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>
                <button type="button" class="btn btn-success" id="btnCrearTraspaso">
                    <i class="fas fa-save"></i> Crear Traspaso
                </button>
            </div>
        </div>
    </div>
</div>
