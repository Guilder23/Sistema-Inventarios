services:
  - type: web
    name: sistema-inventario
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn sistemaInventario.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-inventario-db
          property: connectionString

databases:
  - name: sistema-inventario-db
    databaseName: sistema_inventario
    plan: free
