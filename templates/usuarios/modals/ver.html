<!-- MODAL: VER USUARIO -->
<div class="modal fade" id="modalVerUsuario" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-eye"></i> Detalles del Usuario
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label"><strong>Usuario:</strong></label>
                    <p id="verUsername" class="form-control-plaintext"></p>
                </div>

                <div class="form-group">
                    <label class="form-label"><strong>Nombre Completo:</strong></label>
                    <p id="verNombrecompleto" class="form-control-plaintext"></p>
                </div>

                <div class="form-group">
                    <label class="form-label"><strong>Correo Electrónico:</strong></label>
                    <p id="verEmail" class="form-control-plaintext"></p>
                </div>

                <div class="form-group">
                    <label class="form-label"><strong>Estado:</strong></label>
                    <p id="verEstado" class="form-control-plaintext"></p>
                </div>

                <div class="form-group">
                    <label class="form-label"><strong>Tipo de Usuario:</strong></label>
                    <p id="verTipo" class="form-control-plaintext"></p>
                </div>

                <div class="form-group">
                    <label class="form-label"><strong>Fecha de Registro:</strong></label>
                    <p id="verFecha" class="form-control-plaintext"></p>
                </div>

                <div class="form-group">
                    <label class="form-label"><strong>Último Acceso:</strong></label>
                    <p id="verUltimoAcceso" class="form-control-plaintext"></p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>
