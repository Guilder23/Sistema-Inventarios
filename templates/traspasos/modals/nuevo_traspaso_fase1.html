<!-- Modal Nuevo Traspaso Fase 1 -->
<div class="modal fade" id="modalNuevoTraspaso" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nuevo Traspaso - Fase 1: Seleccionar Productos</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="formFase1Traspaso">
                    <div class="form-group">
                        <label for="tipoTraspaso">Tipo de Traspaso</label>
                        <select class="form-control" id="tipoTraspaso" name="tipo" required>
                            <option value="">Seleccionar...</option>
                            <option value="normal">Transferencia Normal</option>
                            <option value="devolucion">Devolución</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="buscarProducto">Productos Disponibles</label>
                        <div class="input-group mb-3">
                            <input type="text" class="form-control" id="buscarProducto" placeholder="Buscar producto...">
                        </div>
                        <div id="listaProductos" class="tabla-productos">
                            <!-- Se llena con AJAX -->
                        </div>
                    </div>

                    <div class="form-group">
                        <h6 class="font-weight-bold">Productos Seleccionados</h6>
                        <div id="productosSeleccionados" class="tabla-productos-seleccionados">
                            <!-- Se llena dinámicamente -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnContinuarFase2">
                    Continuar a Fase 2 <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>
