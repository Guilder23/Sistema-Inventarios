<!-- MODAL: CREAR PEDIDO -->
<div class="modal fade" id="modalCrearPedido" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-plus"></i> Crear Nuevo Pedido
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formCrearPedido" method="post" action="{% url 'crear_pedido' %}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-store"></i> Datos del Pedido
                            </h6>

                            <div class="form-group">
                                <label class="form-label">Tienda Solicitante</label>
                                <input type="text" class="form-control" value="{{ perfil.nombre_ubicacion|default:'Mi tienda' }}" disabled>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Almacén Proveedor</label>
                                <input type="text" class="form-control" value="{{ proveedor.nombre_ubicacion|default:'Almacén' }}" disabled>
                            </div>

                            <div class="form-group">
                                <label for="comentarioPedido" class="form-label">Comentario</label>
                                <textarea
                                    class="form-control"
                                    id="comentarioPedido"
                                    name="comentario"
                                    rows="4"
                                    placeholder="Observaciones del pedido (opcional)"
                                ></textarea>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-box"></i> Agregar Productos
                            </h6>

                            <div class="form-group">
                                <label for="pedidoProductoSelect" class="form-label">Producto</label>
                                <select class="form-control" id="pedidoProductoSelect">
                                    <option value="">Seleccione un producto</option>
                                    {% for item in productos_disponibles %}
                                        <option
                                            value="{{ item.producto.id }}"
                                            data-codigo="{{ item.producto.codigo }}"
                                            data-nombre="{{ item.producto.nombre }}"
                                            data-stock="{{ item.stock }}"
                                        >
                                            {{ item.producto.codigo }} - {{ item.producto.nombre }} (Stock: {{ item.stock }})
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="pedidoCantidadInput" class="form-label">Cantidad</label>
                                <input type="number" class="form-control" id="pedidoCantidadInput" min="1" value="1">
                            </div>

                            <button type="button" class="btn btn-primary btn-block mb-2" id="btnAgregarItemPedido">
                                <i class="fas fa-plus"></i> Agregar al pedido
                            </button>
                        </div>
                    </div>

                    <hr>
                    <div class="table-responsive">
                        <table class="table table-sm table-bordered mb-0" id="tablaItemsPedido">
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Producto</th>
                                    <th>Stock</th>
                                    <th>Cantidad</th>
                                    <th class="text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr id="filaVaciaPedido">
                                    <td colspan="5" class="text-center text-muted">Aún no agregaste productos</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Pedido
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
