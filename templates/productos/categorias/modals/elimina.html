<div class="modal fade" id="modalEliminarCategoria" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content border-danger">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">
                    <i class="fas fa-lock"></i> Activar/Desactivar Categoría
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="alert alert-info" role="alert">
                    <i class="fas fa-info-circle"></i>
                    <strong>Información:</strong> Esta acción cambiará el estado de la categoría.
                </div>
                <p>¿Está seguro de que desea cambiar el estado de la categoría <strong id="eliminarCategoriaNombre"></strong>?</p>
                <p class="text-muted small">La categoría se activará o desactivará según su estado actual.</p>
            </div>
            <form id="formEliminarCategoria" method="post">
                {% csrf_token %}
                <input type="hidden" id="eliminarCategoriaId" name="categoria_id">
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-danger btn-sm">
                        <i class="fas fa-lock"></i> Cambiar Estado
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
