<!-- MODAL: CAMBIAR ESTADO ALMACÉN -->
<div class="modal fade" id="modalEliminarAlmacen" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content border-danger">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">
                    <i class="fas fa-power-off"></i> Cambiar Estado
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="alert alert-warning" role="alert">
                    <i class="fas fa-exclamation-triangle"></i>
                    <strong>Atención:</strong> Esta acción cambiará el estado del almacén.
                </div>
                <p>¿Está seguro de que desea cambiar el estado del almacén <strong id="eliminarAlmacenNombre"></strong>?</p>
                <p class="text-muted small"></p>
            </div>
            <form id="formEliminarAlmacen" method="post" action="">
                {% csrf_token %}
                <input type="hidden" id="eliminarAlmacenId" name="almacen_id">
                <input type="hidden" id="eliminarAlmacenEstado" name="estado" value="inactivo">
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-danger btn-sm">
                        <i class="fas fa-power-off"></i> Cambiar Estado
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
