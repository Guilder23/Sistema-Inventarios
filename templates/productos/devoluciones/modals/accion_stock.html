<div class="modal fade" id="modalAccionStock" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <form method="post" id="formAccionStock" action="">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloAccionStock">Acción de Stock</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p class="mb-2">Producto: <strong id="nombreProductoAccion">-</strong></p>
                    <p class="mb-3">Pendiente: <strong id="maximoAccion">0</strong> unidades</p>

                    <div class="form-group">
                        <label>Cantidad <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="cantidadAccion" name="cantidad" min="1" required>
                    </div>
                    <div class="form-group mb-0">
                        <label>Comentario</label>
                        <textarea class="form-control" name="comentario" rows="2" placeholder="Opcional"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btnConfirmarAccion">Confirmar</button>
                </div>
            </form>
        </div>
    </div>
</div>
