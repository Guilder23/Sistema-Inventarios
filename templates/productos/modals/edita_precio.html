<!-- MODAL: EDITAR PRECIO (ADMINISTRADOR) -->
<div class="modal fade" id="modalEditarPrecio" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-dollar-sign"></i> Editar Precios del Producto
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formEditarPrecio" method="post">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i> Como administrador, puedes editar todos los precios del producto.
                    </div>

                    <div class="form-group">
                        <label for="precio_producto" class="form-label">Producto</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="precio_producto" 
                            disabled
                        >
                    </div>

                    <hr>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="precio_unitario" class="form-label">Precio Unitario (Bs.) <span class="text-danger">*</span></label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="precio_unitario" 
                                    name="precio_unidad"
                                    required
                                    step="0.01"
                                    min="0"
                                >
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="precio_compra" class="form-label">P. Compra (Bs.)</label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="precio_compra" 
                                    name="precio_compra"
                                    step="0.01"
                                    min="0"
                                >
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="precio_caja" class="form-label">P. Caja (Bs.)</label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="precio_caja" 
                                    name="precio_caja"
                                    step="0.01"
                                    min="0"
                                >
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="precio_mayor" class="form-label">P. Mayor (Bs.)</label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="precio_mayor" 
                                    name="precio_mayor"
                                    step="0.01"
                                    min="0"
                                >
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="poliza" class="form-label">Póliza (Bs.)</label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="poliza" 
                                    name="poliza"
                                    step="0.01"
                                    min="0"
                                >
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="gastos" class="form-label">Gastos (Bs.)</label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="gastos" 
                                    name="gastos"
                                    step="0.01"
                                    min="0"
                                >
                            </div>
                        </div>
                    </div>

                    <div class="alert alert-warning">
                        <i class="fas fa-history"></i> Todos los cambios serán registrados en el historial del producto.
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Precios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
