<!-- MODAL: VER PRODUCTO -->
<div class="modal fade" id="modalVerProducto" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-xl modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-eye"></i> Detalles del Producto
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <!-- COLUMNA IZQUIERDA: Imagen y Estado -->
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body text-center">
                                <div id="previewProductoFoto" class="mb-3">
                                    <!-- Foto aparecerá aquí -->
                                </div>
                                <div id="verEstadoBtn" class="mb-2">
                                    <!-- Estado badge aquí -->
                                </div>
                                <div id="verCodigoDisplay" class="mt-3">
                                    <!-- Código en badge -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- COLUMNA CENTRAL: Información Principal -->
                    <div class="col-md-4">
                        <div class="info-section">
                            <h6 class="section-title">
                                <i class="fas fa-info-circle"></i> Información General
                            </h6>
                            
                            <div class="info-item">
                                <label>Nombre:</label>
                                <p id="verNombre"></p>
                            </div>

                            <div class="info-item">
                                <label>Categoría:</label>
                                <p id="verCategoria"></p>
                            </div>

                            <div class="info-item">
                                <label>Descripción:</label>
                                <p id="verDescripcion" class="text-muted"></p>
                            </div>
                        </div>

                        <div class="info-section mt-4">
                            <h6 class="section-title">
                                <i class="fas fa-boxes"></i> Control de Stock
                            </h6>
                            
                            <div class="row">
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>Stock Actual:</label>
                                        <p id="verStock" class="font-weight-bold"></p>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>Unid. x Caja:</label>
                                        <p id="verUnidadesPorCaja"></p>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>Stock Crítico:</label>
                                        <p id="verStockCritico" class="text-danger"></p>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>Stock Bajo:</label>
                                        <p id="verStockBajo" class="text-warning"></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- COLUMNA DERECHA: Precios y Auditoría -->
                    <div class="col-md-4">
                        <div class="info-section">
                            <h6 class="section-title">
                                <i class="fas fa-dollar-sign"></i> Precios (Bs.)
                            </h6>
                            
                            <div class="info-item">
                                <label>Precio Unitario:</label>
                                <p id="verPrecioUnidad" class="font-weight-bold text-success"></p>
                            </div>

                            <div class="row">
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>P. Compra:</label>
                                        <p id="verPrecioCompra"></p>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>P. Caja:</label>
                                        <p id="verPrecioCaja"></p>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>P. Mayor:</label>
                                        <p id="verPrecioMayor"></p>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>Póliza:</label>
                                        <p id="verPoliza"></p>
                                    </div>
                                </div>
                            </div>

                            <div class="info-item">
                                <label>Gastos:</label>
                                <p id="verGastos"></p>
                            </div>
                        </div>

                        <div class="info-section mt-4">
                            <h6 class="section-title">
                                <i class="fas fa-history"></i> Auditoría
                            </h6>
                            
                            <div class="info-item">
                                <label>Creado por:</label>
                                <p id="verCreadoPor"></p>
                            </div>

                            <div class="info-item">
                                <label>Fecha de creación:</label>
                                <p id="verFechaCreacion"></p>
                            </div>

                            <div class="info-item">
                                <label>Última actualización:</label>
                                <p id="verFechaActualizacion"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">
                    <i class="fas fa-times"></i> Cerrar
                </button>
            </div>
        </div>
    </div>
</div>
