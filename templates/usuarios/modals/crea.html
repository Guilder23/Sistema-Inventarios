<!-- MODAL: CREAR USUARIO -->
<div class="modal fade" id="modalCrearUsuario" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-user-plus"></i> Crear Nuevo Usuario
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formCrearUsuario" method="post" action="{% url 'crear_usuario' %}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="row">
                        <!-- COLUMNA IZQUIERDA -->
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-user"></i> Información Personal
                            </h6>
                            
                            <div class="form-group">
                                <label for="username" class="form-label">Usuario <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="username" 
                                    name="username" 
                                    required
                                    placeholder="Ingrese el nombre de usuario"
                                >
                                <small class="form-text text-muted">Solo letras, números y @/./+/-/_</small>
                            </div>

                            <div class="form-group">
                                <label for="email" class="form-label">Correo Electrónico <span class="text-danger">*</span></label>
                                <input 
                                    type="email" 
                                    class="form-control" 
                                    id="email" 
                                    name="email" 
                                    required
                                    placeholder="ejemplo@correo.com"
                                >
                            </div>

                            <div class="form-group">
                                <label for="first_name" class="form-label">Nombre</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="first_name" 
                                    name="first_name" 
                                    placeholder="Nombre del usuario"
                                >
                            </div>

                            <div class="form-group">
                                <label for="last_name" class="form-label">Apellido</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="last_name" 
                                    name="last_name" 
                                    placeholder="Apellido del usuario"
                                >
                            </div>
                        </div>

                        <!-- COLUMNA DERECHA -->
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-lock"></i> Seguridad y Rol
                            </h6>

                            <div class="form-group">
                                <label for="password" class="form-label">Contraseña <span class="text-danger">*</span></label>
                                <input 
                                    type="password" 
                                    class="form-control" 
                                    id="password" 
                                    name="password" 
                                    required
                                    placeholder="Ingrese la contraseña"
                                >
                                <small class="form-text text-muted">Mínimo 8 caracteres</small>
                            </div>

                            <div class="form-group">
                                <label for="password2" class="form-label">Repetir Contraseña <span class="text-danger">*</span></label>
                                <input 
                                    type="password" 
                                    class="form-control" 
                                    id="password2" 
                                    name="password2" 
                                    required
                                    placeholder="Repita la contraseña"
                                >
                            </div>

                            <div class="form-group">
                                <label for="rol" class="form-label">Rol del Usuario <span class="text-danger">*</span></label>
                                <select class="form-control" id="rol" name="rol" required>
                                    <option value="">Seleccione un rol</option>
                                    <option value="administrador">Administrador</option>
                                    <option value="almacen">Almacén</option>
                                    <option value="tienda">Tienda</option>
                                    <option value="deposito">Depósito</option>
                                    <option value="tienda_online">Tienda Virtual</option>
                                </select>
                            </div>

                            <!-- Selector de Almacén (Solo para Personal de Almacén) -->
                            <div class="form-group" id="grupoAlmacen" style="display: none;">
                                <label for="almacen" class="form-label">Almacén <span class="text-danger">*</span></label>
                                <select class="form-control" id="almacen" name="almacen">
                                    <option value="">Seleccione un almacén</option>
                                    {% for almacen in almacenes %}
                                        <option value="{{ almacen.id }}">{{ almacen.nombre }} - {{ almacen.ciudad }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <!-- Selector de Tienda (Solo para Personal de Tienda) -->
                            <div class="form-group" id="grupoTienda" style="display: none;">
                                <label for="tienda" class="form-label">Tienda <span class="text-danger">*</span></label>
                                <select class="form-control" id="tienda" name="tienda">
                                    <option value="">Seleccione una tienda</option>
                                    {% for tienda in tiendas %}
                                        <option value="{{ tienda.id }}">{{ tienda.nombre }} - {{ tienda.ciudad }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="form-group">
                                <div class="custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input" id="is_active" name="is_active" checked>
                                    <label class="custom-control-label" for="is_active">Usuario Activo</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Usuario
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
