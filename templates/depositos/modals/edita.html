<!-- MODAL: EDITAR DEPÓSITO -->
<div class="modal fade" id="modalEditarDeposito" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title">
                    <i class="fas fa-edit"></i> Editar Depósito
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formEditarDeposito" method="post" action="">
                {% csrf_token %}
                <input type="hidden" id="editarId" name="deposito_id">
                <div class="modal-body">
                    <div class="row">
                        <!-- COLUMNA IZQUIERDA -->
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-info-circle"></i> Información Básica
                            </h6>
                            
                            <div class="form-group">
                                <label for="editarNombre" class="form-label">Nombre del Depósito <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarNombre" 
                                    name="nombre" 
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarDescripcion" class="form-label">Descripción</label>
                                <textarea 
                                    class="form-control" 
                                    id="editarDescripcion" 
                                    name="descripcion" 
                                    rows="2"
                                ></textarea>
                            </div>

                            <div class="form-group">
                                <label for="editarTipo" class="form-label">Tipo de Depósito <span class="text-danger">*</span></label>
                                <select class="form-control" id="editarTipo" name="tipo" required>
                                    <option value="">Seleccionar tipo...</option>
                                    <option value="principal">Principal</option>
                                    <option value="secundario">Secundario</option>
                                    <option value="temporal">Temporal</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="editarTienda" class="form-label">Tienda <span class="text-danger">*</span></label>
                                <select class="form-control" id="editarTienda" name="tienda" required>
                                    <option value="">Seleccionar tienda...</option>
                                    {% for tienda in tiendas %}
                                        <option value="{{ tienda.id }}">{{ tienda.nombre }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="editarEstado" class="form-label">Estado <span class="text-danger">*</span></label>
                                <select class="form-control" id="editarEstado" name="estado" required>
                                    <option value="activo">Activo</option>
                                    <option value="inactivo">Inactivo</option>
                                </select>
                            </div>
                        </div>

                        <!-- COLUMNA DERECHA -->
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-map"></i> Ubicación
                            </h6>

                            <div class="form-group">
                                <label for="editarDireccion" class="form-label">Dirección <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarDireccion" 
                                    name="direccion" 
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarCiudad" class="form-label">Ciudad <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarCiudad" 
                                    name="ciudad" 
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarDepartamento" class="form-label">Departamento <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarDepartamento" 
                                    name="departamento" 
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="editarCoordenadas" class="form-label">Coordenadas GPS</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editarCoordenadas" 
                                    name="coordenadas" 
                                >
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
