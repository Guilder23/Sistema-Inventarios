<!-- MODAL: EDITAR PRODUCTO (ALMACÉN) -->
<div class="modal fade" id="modalEditarProducto" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-edit"></i> Editar Producto
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formEditarProducto" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="row">
                        <!-- COLUMNA IZQUIERDA -->
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-info-circle"></i> Información del Producto
                            </h6>
                            
                            <div class="form-group">
                                <label for="edit_codigo" class="form-label">Código <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="edit_codigo" 
                                    name="codigo" 
                                    required
                                    placeholder="Ej: PROD-001"
                                >
                            </div>

                            <div class="form-group">
                                <label for="edit_nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="edit_nombre" 
                                    name="nombre" 
                                    required
                                    placeholder="Nombre del producto"
                                >
                            </div>

                            <div class="form-group">
                                <label for="edit_descripcion" class="form-label">Detalle/Descripción</label>
                                <textarea 
                                    class="form-control" 
                                    id="edit_descripcion" 
                                    name="descripcion"
                                    rows="3"
                                    placeholder="Descripción del producto"
                                ></textarea>
                            </div>

                            <div class="form-group">
                                <label for="edit_foto" class="form-label">Foto de Producto</label>
                                <div id="previewFotoEditar" class="mb-2">
                                    <!-- Se llena con JavaScript -->
                                </div>
                                <div class="custom-file">
                                    <input 
                                        type="file" 
                                        class="custom-file-input" 
                                        id="edit_foto" 
                                        name="foto"
                                        accept="image/*"
                                    >
                                    <label class="custom-file-label" for="edit_foto">Seleccionar archivo</label>
                                </div>
                                <small class="form-text text-muted">Formatos: JPG, PNG, GIF</small>
                            </div>
                        </div>

                        <!-- COLUMNA DERECHA -->
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-boxes"></i> Stock y Precios
                            </h6>

                            <div class="form-group">
                                <label for="edit_stock" class="form-label">Unidades en Stock <span class="text-danger">*</span></label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="edit_stock" 
                                    name="stock" 
                                    required
                                    value="0"
                                    min="0"
                                >
                            </div>

                            <div class="form-group">
                                <label for="edit_unidades_por_caja" class="form-label">Unidades x Caja <span class="text-danger">*</span></label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="edit_unidades_por_caja" 
                                    name="unidades_por_caja" 
                                    required
                                    value="1"
                                    min="1"
                                >
                            </div>

                            <div class="form-group">
                                <label for="edit_precio_unidad" class="form-label">Precio Unitario (Bs.) <span class="text-danger">*</span></label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="edit_precio_unidad" 
                                    name="precio_unidad" 
                                    required
                                    value="0"
                                    step="0.01"
                                    min="0"
                                >
                            </div>

                            <h6 class="text-muted mb-3 mt-4">
                                <i class="fas fa-exclamation-triangle"></i> Niveles de Stock
                            </h6>

                            <div class="form-group">
                                <label for="edit_stock_critico" class="form-label">Stock Crítico</label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="edit_stock_critico" 
                                    name="stock_critico" 
                                    value="10"
                                    min="0"
                                >
                            </div>

                            <div class="form-group">
                                <label for="edit_stock_bajo" class="form-label">Stock Bajo</label>
                                <input 
                                    type="number" 
                                    class="form-control" 
                                    id="edit_stock_bajo" 
                                    name="stock_bajo" 
                                    value="30"
                                    min="0"
                                >
                            </div>

                            <div class="form-group mt-3">
                                <div class="custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input" id="edit_activo" name="activo">
                                    <label class="custom-control-label" for="edit_activo">Producto Activo</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
