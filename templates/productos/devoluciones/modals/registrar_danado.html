<div class="modal fade" id="modalRegistrarDanado" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <form method="post" enctype="multipart/form-data" action="{% url 'listar_danados' %}">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-triangle-exclamation text-warning"></i> Registrar Producto Dañado</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group col-md-8">
                            <label>Producto <span class="text-danger">*</span></label>
                            <select class="form-control" name="producto" required>
                                <option value="">Seleccione un producto...</option>
                                {% for producto in productos %}
                                <option value="{{ producto.id }}">{{ producto.codigo }} - {{ producto.nombre }} (Stock: {{ producto.stock }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group col-md-4">
                            <label>Unidades Dañadas <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" name="cantidad" min="1" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Comentario</label>
                        <textarea class="form-control" name="comentario" rows="3" placeholder="Detalle del daño, causa o referencia..."></textarea>
                    </div>
                    <div class="form-group mb-0">
                        <label>Foto (opcional)</label>
                        <input type="file" class="form-control-file" name="foto" accept="image/*">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Registrar Dañado</button>
                </div>
            </form>
        </div>
    </div>
</div>
