<!-- Modal Ver Producto Dañado -->
<div class="modal fade" id="modalVerDanado" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-eye"></i> Detalles del Producto Dañado
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <!-- COLUMNA IZQUIERDA: Evidencia Fotográfica -->
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body text-center">
                                <div id="verFotoDanoContainer" class="mb-3">
                                    <img id="verFotoDano" src="" alt="Producto dañado" class="img-preview-danado">
                                </div>
                                <div id="verFotoDanoPlaceholder" class="foto-placeholder mb-3" style="display: none;">
                                    <i class="fas fa-camera fa-4x text-muted mb-2"></i>
                                    <p class="text-muted mb-0 small">Sin evidencia fotográfica</p>
                                </div>
                                <div id="verEstadoDanado" class="mb-2">
                                    <!-- Estado badge aquí -->
                                </div>
                                <div id="verCodigoDisplay" class="mt-3">
                                    <!-- Código en badge -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- COLUMNA CENTRAL: Información del Producto -->
                    <div class="col-md-4">
                        <div class="info-section">
                            <h6 class="section-title">
                                <i class="fas fa-box"></i> Información del Producto
                            </h6>
                            
                            <div class="info-item">
                                <label>Nombre:</label>
                                <p id="verNombreProducto">-</p>
                            </div>

                            <div class="info-item">
                                <label>Categoría:</label>
                                <p id="verCategoriaProducto">-</p>
                            </div>

                            <div class="row">
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>Stock Actual:</label>
                                        <p><span class="badge-danado badge-stock" id="verStockProducto">0</span></p>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="info-item text-center">
                                        <label>Foto Producto:</label>
                                        <div id="verFotoProductoContainer">
                                            <img id="verFotoProducto" src="" alt="Producto" class="img-producto-mini">
                                        </div>
                                        <div id="verFotoProductoPlaceholder" class="foto-placeholder-mini" style="display: none;">
                                            <i class="fas fa-image fa-2x text-muted"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="info-section mt-3">
                            <h6 class="section-title">
                                <i class="fas fa-chart-bar"></i> Cantidades
                            </h6>
                            
                            <div class="row">
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>Dañadas:</label>
                                        <p><span class="badge-danado badge-dano" id="verCantidadDanada">0</span></p>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>Pendiente:</label>
                                        <p><span class="badge-danado badge-pendiente" id="verCantidadPendiente">0</span></p>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>Recuperadas:</label>
                                        <p><span class="badge-danado badge-recuperada" id="verCantidadRecuperada">0</span></p>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="info-item">
                                        <label>Repuestas:</label>
                                        <p><span class="badge-danado badge-repuesta" id="verCantidadRepuesta">0</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- COLUMNA DERECHA: Detalles y Auditoría -->
                    <div class="col-md-4">
                        <div class="info-section">
                            <h6 class="section-title">
                                <i class="fas fa-clipboard-list"></i> Detalles
                            </h6>
                            
                            <div class="info-item">
                                <label>Comentario:</label>
                                <p id="verComentario" class="text-muted">-</p>
                            </div>

                            <div class="info-item">
                                <label>Fecha de Registro:</label>
                                <p id="verFechaRegistro">-</p>
                            </div>
                        </div>

                        <div class="info-section mt-3">
                            <h6 class="section-title">
                                <i class="fas fa-user"></i> Información de Registro
                            </h6>
                            
                            <div class="info-item">
                                <label>Ubicación:</label>
                                <p id="verUbicacion">-</p>
                            </div>

                            <div class="info-item">
                                <label>Registrado por:</label>
                                <p id="verRegistradoPor">-</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">
                    <i class="fas fa-times"></i> Cerrar
                </button>
            </div>
        </div>
    </div>
</div>
