<div class="modal fade" id="modalEditarCategoria" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-edit"></i> Editar Categoría
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formEditarCategoria" method="post">
                {% csrf_token %}
                <input type="hidden" id="editarCategoriaId" name="categoria_id">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="editNombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                        <input
                            type="text"
                            class="form-control"
                            id="editNombre"
                            name="nombre"
                            required
                            maxlength="100"
                        >
                    </div>

                    <div class="form-group">
                        <label for="editDescripcion" class="form-label">Descripción</label>
                        <textarea
                            class="form-control"
                            id="editDescripcion"
                            name="descripcion"
                            rows="4"
                        ></textarea>
                    </div>

                    <div class="form-group mb-0">
                        <div class="custom-control custom-checkbox">
                            <input type="checkbox" class="custom-control-input" id="editActivo" name="activo">
                            <label class="custom-control-label" for="editActivo">
                                <strong>Categoría Activa</strong>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
